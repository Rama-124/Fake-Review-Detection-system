<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .auth-layout {
            width: min(1040px, 100%);
            display: grid;
            grid-template-columns: 1fr 0.92fr;
            overflow: hidden;
        }

        .auth-form {
            padding: 34px 32px;
        }

        .auth-visual {
            padding: 26px;
            background: linear-gradient(135deg, #edf8ef, #f7f1e5);
        }

        .auth-visual img {
            width: 100%;
            height: 100%;
            min-height: 360px;
            object-fit: cover;
            border-radius: 24px;
        }

        .auth-link {
            display: inline-block;
            margin-top: 14px;
            color: var(--forest-700);
            font-weight: 700;
            text-decoration: none;
        }

        @media (max-width: 860px) {
            .auth-layout {
                grid-template-columns: 1fr;
            }

            .auth-visual {
                order: -1;
            }
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <section class="section-card auth-layout">
            <div class="glass-form auth-form">
                <div class="eyebrow">Create Access</div>
                <h1 style="margin:10px 0 10px;font-size:2rem;">Register for the live demo</h1>
                <p class="section-copy">Create a test account so you can move through checkout and submit reviews into the monitoring engine.</p>
                <form id="registration-form">
                    <div class="field">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Your full name" required>
                    </div>
                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="name@example.com" required>
                    </div>
                    <div class="field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Create a password" required>
                    </div>
                    <button type="submit" class="primary-button" style="width:100%;justify-content:center;">Register</button>
                </form>
                <a href="login.html" class="auth-link">Already have an account? Log in</a>
            </div>
            <div class="auth-visual">
                <img src="registration.png" alt="Registration illustration">
            </div>
        </section>
    </div>

    <script>
        document.getElementById('registration-form').addEventListener('submit', async (event) => {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData);
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                alert(result.message);
                if (response.ok) {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            }
        });
    </script>
</body>
</html>
