<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .auth-layout {
            width: min(980px, 100%);
            display: grid;
            grid-template-columns: 0.95fr 1.05fr;
            overflow: hidden;
        }

        .auth-visual {
            padding: 28px;
            background: linear-gradient(155deg, rgba(22, 55, 31, 0.94), rgba(46, 107, 63, 0.92));
            color: #fff;
        }

        .auth-visual img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 20px;
            margin-top: 24px;
        }

        .auth-form {
            padding: 34px 32px;
        }

        .auth-form h1 {
            margin: 8px 0 10px;
            font-size: 2rem;
        }

        .auth-form p {
            color: var(--ink-700);
        }

        .auth-link {
            display: inline-block;
            margin-top: 12px;
            color: var(--forest-700);
            font-weight: 700;
            text-decoration: none;
        }

        @media (max-width: 860px) {
            .auth-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-shell">
        <section class="section-card auth-layout">
            <div class="auth-visual">
                <div class="eyebrow" style="color:rgba(255,255,255,.76);">Live Access</div>
                <h2 style="margin:10px 0 12px;font-size:2.1rem;">Enter the monitoring demo.</h2>
                <p style="color:rgba(255,255,255,.82);line-height:1.7;">Sign in to browse products, create orders, and test how the system evaluates review authenticity signals.</p>
                <img src="login.png" alt="Login illustration">
            </div>

            <div class="glass-form auth-form">
                <div class="eyebrow">Account Login</div>
                <h1>Welcome back</h1>
                <p>Use your registered email and password to continue into the demo storefront.</p>
                <div class="field">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="name@example.com" required>
                </div>
                <div class="field">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <button id="login-button" class="primary-button" style="width:100%;justify-content:center;">Login</button>
                <a href="registration.html" class="auth-link">Need an account? Register here</a>
            </div>
        </section>
    </div>
    <script src="auth.js"></script>
    <script>
        document.getElementById('login-button').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email, password }),
            });

            const result = await response.json();
            if (response.ok) {
                alert('Login successful!');
                localStorage.setItem('token', result.token);
                localStorage.setItem('user', JSON.stringify(result.user || { email }));
                const returnTo = new URLSearchParams(window.location.search).get('returnTo');
                window.location.href = returnTo && returnTo.startsWith('/') ? returnTo : 'shop.html';
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
