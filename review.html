<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Monitoring Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-header {
            padding: 8px 0 22px;
        }

        .dashboard-copy {
            padding: 0 24px 28px;
            color: #fff;
        }

        .dashboard-copy h1 {
            margin: 10px 0 10px;
            font-size: 2.4rem;
        }

        .dashboard-copy p {
            margin: 0;
            max-width: 760px;
            color: rgba(255, 255, 255, 0.82);
            line-height: 1.7;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 14px;
            margin-top: 22px;
        }

        .summary-card {
            padding: 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .summary-card strong {
            display: block;
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        .orders-list {
            display: grid;
            gap: 18px;
            margin: 26px 0 40px;
        }

        .order {
            display: grid;
            grid-template-columns: 170px 1fr;
            gap: 20px;
            padding: 20px;
        }

        .order img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            border-radius: 18px;
            background: #fff;
            border: 1px solid var(--line);
            padding: 14px;
        }

        .order h2 {
            margin: 0 0 8px;
            font-size: 1.35rem;
        }

        .order-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            color: var(--ink-700);
        }

        .meta-chip {
            padding: 7px 10px;
            border-radius: 999px;
            background: rgba(74, 169, 108, 0.10);
            color: var(--forest-800);
            font-size: 0.86rem;
            font-weight: 700;
        }

        .reviews {
            display: grid;
            gap: 12px;
        }

        .review {
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
        }

        .review p {
            margin: 0 0 10px;
            line-height: 1.55;
        }

        .fake-review {
            border-color: rgba(184, 52, 52, 0.28);
            background: rgba(255, 238, 238, 0.92);
        }

        .positive-review {
            border-color: rgba(46, 107, 63, 0.24);
        }

        .negative-review {
            border-color: rgba(188, 130, 25, 0.28);
        }

        .neutral-review {
            border-color: rgba(68, 81, 73, 0.18);
        }

        .analysis-alert {
            padding: 10px 12px;
            border-radius: 12px;
            margin-top: 8px;
            background: rgba(255, 255, 255, 0.72);
        }

        .fake-alert {
            color: #8d2222;
            background: rgba(255, 230, 230, 0.92);
        }

        .verified-alert {
            color: var(--forest-800);
            background: rgba(74, 169, 108, 0.12);
        }

        .neutral-alert {
            color: var(--ink-700);
            background: rgba(68, 81, 73, 0.08);
        }

        .technical-details {
            color: var(--ink-700);
            font-size: 0.9rem;
            line-height: 1.55;
        }

        .review-form {
            margin-top: 16px;
            display: grid;
            gap: 10px;
        }

        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 14px;
            min-height: 110px;
            resize: vertical;
            font: inherit;
        }

        .error,
        .loading {
            padding: 24px;
            text-align: center;
            color: var(--ink-700);
        }

        .error {
            color: #8d2222;
        }

        .pending-review {
            opacity: 0.75;
            border-style: dashed;
        }

        @media (max-width: 760px) {
            .order {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="hero-bar dashboard-header">
            <div class="hero-nav">
                <div class="brand-mark">
                    <span class="brand-badge">FR</span>
                    Review Dashboard
                </div>
                <div class="nav-actions">
                    <a href="home.html" class="nav-pill">Overview</a>
                    <a href="shop.html" class="nav-pill">Shop</a>
                    <span data-auth-nav></span>
                </div>
            </div>
            <div class="dashboard-copy">
                <div class="eyebrow" style="color:rgba(255,255,255,.76);">Live Review Monitoring</div>
                <h1>Analyze submitted reviews and suspicious signals.</h1>
                <p>Orders appear here after checkout. Submit reviews, inspect sentiment, and see why the system marks content as suspicious or genuine.</p>
                <div id="summary" class="summary-grid">
                    <div class="summary-card"><strong>0</strong>Orders</div>
                    <div class="summary-card"><strong>0</strong>Reviews</div>
                    <div class="summary-card"><strong>0</strong>Flagged</div>
                </div>
            </div>
        </header>

        <main id="orders" class="orders-list">
            <div class="section-card loading">Loading reviews...</div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        if (!requireLogin()) {
            throw new Error('Login required');
        }
        renderUserNav();

        let isLoading = true;
        let isWriting = false;
        const textareaValues = new Map();

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        async function loadOrders() {
            try {
                if (isWriting) return;

                const scrollPosition = window.scrollY;
                const tempValues = new Map();
                document.querySelectorAll('textarea').forEach((textarea) => {
                    tempValues.set(textarea.id, textarea.value);
                });

                isLoading = true;
                updateLoadingState();

                const response = await fetch('/api/orders', {
                    headers: authHeaders()
                });
                if (handleAuthFailure(response)) {
                    return;
                }
                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.message || 'Failed to load orders');
                }

                displaySummary(data.orders);
                displayOrders(data.orders);

                requestAnimationFrame(() => {
                    data.orders.forEach((order) => {
                        const textarea = document.getElementById(`review-${order._id}`);
                        if (textarea) textarea.value = tempValues.get(`review-${order._id}`) || '';
                    });
                    window.scrollTo(0, scrollPosition);
                });
            } catch (error) {
                showError(`Error loading reviews: ${error.message}`);
            } finally {
                isLoading = false;
                updateLoadingState();
            }
        }

        function displaySummary(orders) {
            const totalReviews = orders.reduce((sum, order) => sum + (order.reviews || []).length, 0);
            const flaggedReviews = orders.reduce((sum, order) => (
                sum + (order.reviews || []).filter((review) => review.isFake).length
            ), 0);

            document.getElementById('summary').innerHTML = `
                <div class="summary-card"><strong>${orders.length}</strong>Orders</div>
                <div class="summary-card"><strong>${totalReviews}</strong>Reviews</div>
                <div class="summary-card"><strong>${flaggedReviews}</strong>Flagged</div>
            `;
        }

        function displayOrders(orders) {
            const container = document.getElementById('orders');
            if (!orders || orders.length === 0) {
                return showError('No orders found yet. Place an order from the shop to begin monitoring reviews.');
            }

            container.innerHTML = orders.map((order) => `
                <article class="section-card order">
                    <img src="${escapeHtml(order.productImage)}" alt="${escapeHtml(order.productName)}">
                    <div>
                        <h2>${escapeHtml(order.productName)}</h2>
                        <div class="order-meta">
                            <span class="meta-chip">$${Number(order.productPrice || 0).toFixed(2)}</span>
                            <span class="meta-chip">${(order.reviews || []).length} reviews</span>
                            <span class="meta-chip">Order ${escapeHtml(String(order._id).slice(-6))}</span>
                        </div>

                        <div id="reviews-${order._id}" class="reviews">
                            ${(order.reviews || []).map((review) => createReviewHTML(review)).join('')}
                        </div>

                        <div class="review-form">
                            <textarea id="review-${order._id}"
                                placeholder="Write a detailed review with product-specific details..."
                                oninput="handleTextInput('${order._id}')">${escapeHtml(textareaValues.get(`review-${order._id}`) || '')}</textarea>
                            <button class="primary-button" onclick="submitReview('${order._id}')">Submit Review</button>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function handleTextInput(orderId) {
            isWriting = true;
            const textarea = document.getElementById(`review-${orderId}`);
            textareaValues.set(`review-${orderId}`, textarea.value);
        }

        async function submitReview(orderId) {
            const textarea = document.getElementById(`review-${orderId}`);
            const reviewText = textarea.value.trim();
            const button = textarea.nextElementSibling;
            const reviewsContainer = document.getElementById(`reviews-${orderId}`);

            if (!reviewText) {
                alert('Please write a review before submitting');
                return;
            }
            if (reviewText.length < 20) {
                alert('Review must be at least 20 characters');
                return;
            }

            try {
                textarea.disabled = true;
                button.disabled = true;

                const tempReview = {
                    reviewText,
                    sentiment: 'Pending',
                    analysis: { reviewDelay: Date.now() },
                    isFake: false,
                    reasons: []
                };

                reviewsContainer.insertAdjacentHTML('beforeend', createReviewHTML(tempReview));

                const response = await fetch('/api/reviews', {
                    method: 'POST',
                    headers: authHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify({ orderId, reviewText })
                });
                if (handleAuthFailure(response)) {
                    return;
                }

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Submission failed');
                }

                const lastReview = reviewsContainer.lastElementChild;
                lastReview.outerHTML = createReviewHTML(data.review);
            } catch (error) {
                const lastReview = reviewsContainer.lastElementChild;
                if (lastReview && lastReview.textContent.includes('Submitting')) {
                    lastReview.remove();
                }
                alert(`Submission failed: ${error.message}`);
            } finally {
                textarea.disabled = false;
                button.disabled = false;
                textarea.value = '';
                textareaValues.delete(`review-${orderId}`);
                isWriting = false;
                loadOrders();
            }
        }

        function createReviewHTML(review) {
            const reasons = (review.reasons || []).map(escapeHtml).join(', ') || 'No specific reasons';
            const specificity = review.analysis?.specificity ? `<br>Specificity: ${review.analysis.specificity} terms` : '';
            const similarity = review.analysis?.similarityScore ? `<br>Similarity: ${Math.round((review.analysis.similarityScore || 0) * 100)}%` : '';

            return `
                <div class="review ${getReviewClass(review)} ${review.sentiment === 'Pending' ? 'pending-review' : ''}">
                    <p>${escapeHtml(review.reviewText)}</p>
                    <div class="analysis-alert ${review.isFake ? 'fake-alert' : getSentimentClass(review)}">
                        <strong>Status:</strong> ${review.isFake ? 'Flagged as suspicious' : getStatusText(review)}
                        ${review.isFake ? `
                            <div class="technical-details">
                                Reasons: ${reasons}${specificity}${similarity}
                            </div>
                        ` : `
                            <div class="technical-details">
                                ${getVerificationDetails(review)}${specificity}
                            </div>
                        `}
                    </div>
                    <small class="technical-details">
                        ${review.sentiment === 'Pending'
                            ? 'Submitting...'
                            : `Sentiment: ${Number(review.sentimentScore || 0).toFixed(2)} | IP: ${escapeHtml(review.ipAddress || 'Unknown')} | ${new Date(review.createdAt).toLocaleString()}`}
                    </small>
                </div>`;
        }

        function getReviewClass(review) {
            if (review.isFake) return 'fake-review';
            switch((review.sentiment || '').toLowerCase()) {
                case 'positive': return 'positive-review';
                case 'negative': return 'negative-review';
                case 'neutral': return 'neutral-review';
                default: return 'verified-review';
            }
        }

        function getSentimentClass(review) {
            switch((review.sentiment || '').toLowerCase()) {
                case 'neutral': return 'neutral-alert';
                default: return 'verified-alert';
            }
        }

        function getStatusText(review) {
            if (review.isFake) return 'Flagged';
            return `${escapeHtml(review.sentiment || 'Review')} - Verified`;
        }

        function getVerificationDetails(review) {
            switch((review.sentiment || '').toLowerCase()) {
                case 'positive': return 'Verified positive feedback';
                case 'negative': return 'Verified negative feedback';
                case 'neutral': return 'Verified neutral feedback';
                default: return 'Genuine review';
            }
        }

        function showError(message) {
            const container = document.getElementById('orders');
            container.innerHTML = `<div class="section-card error">${escapeHtml(message)}</div>`;
        }

        function updateLoadingState() {
            const container = document.getElementById('orders');
            if (isLoading) {
                container.innerHTML = '<div class="section-card loading">Loading reviews...</div>';
            } else if (!container.innerHTML.trim()) {
                container.innerHTML = '<div class="section-card error">No orders found</div>';
            }
        }

        loadOrders();
    </script>
</body>
</html>
