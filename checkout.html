<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .checkout-layout {
            display: grid;
            grid-template-columns: 0.85fr 1.15fr;
            gap: 24px;
            margin-top: 26px;
        }

        .product-preview {
            padding: 24px;
        }

        .product-preview img {
            width: 100%;
            max-height: 340px;
            object-fit: contain;
            border-radius: 20px;
            background: #fff;
            padding: 24px;
            border: 1px solid var(--line);
        }

        .price-line {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(74, 169, 108, 0.12);
            color: var(--forest-800);
            font-weight: 800;
        }

        .checkout-form {
            padding: 28px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        @media (max-width: 880px) {
            .checkout-layout {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="hero-bar">
            <div class="hero-nav">
                <div class="brand-mark">
                    <span class="brand-badge">FR</span>
                    Checkout
                </div>
                <div class="nav-actions">
                    <a href="shop.html" class="nav-pill">Back to Shop</a>
                    <a href="review.html" class="nav-pill">Review Dashboard</a>
                </div>
            </div>
        </header>

        <main class="checkout-layout">
            <section class="section-card product-preview">
                <div class="eyebrow">Selected Product</div>
                <h1 id="product-title" style="font-size:1.8rem;margin:10px 0 18px;"></h1>
                <img id="product-image" src="" alt="Product image">
                <div class="price-line" id="product-price"></div>
            </section>

            <section class="section-card checkout-form">
                <div class="eyebrow">Order Details</div>
                <h2 style="margin:10px 0 10px;">Create a test order</h2>
                <p class="section-copy">This order becomes available in the review dashboard so you can submit and analyze a product review.</p>
                <form id="order-form">
                    <div class="field">
                        <label for="name">Name</label>
                        <input type="text" id="name" placeholder="Customer name" required>
                    </div>

                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="field">
                        <label for="address">Address</label>
                        <textarea id="address" rows="4" placeholder="Delivery address" required></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="primary-button" style="flex:1;">Place Order</button>
                        <a href="shop.html" class="secondary-button" style="color:#16371f;border-color:rgba(22,55,31,.12);background:#fff;">Cancel</a>
                    </div>
                </form>
            </section>
        </main>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('name') || 'Selected product';
        const productPrice = urlParams.get('price') || '0';
        const productImage = urlParams.get('image') || '';

        document.getElementById('product-title').innerText = productName;
        document.getElementById('product-price').innerText = `$${Number(productPrice).toFixed(2)}`;
        document.getElementById('product-image').src = productImage;

        document.getElementById('order-form').addEventListener('submit', async (event) => {
            event.preventDefault();

            const orderDetails = {
                name: document.getElementById('name').value.trim(),
                email: document.getElementById('email').value.trim(),
                address: document.getElementById('address').value.trim(),
                productName,
                productPrice,
                productImage
            };

            try {
                const response = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(orderDetails)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to place order');
                }

                alert('Order placed successfully!');
                window.location.href = 'review.html';
            } catch (error) {
                console.error('Error:', error);
                alert(`Error: ${error.message}`);
            }
        });
    </script>
</body>
</html>
